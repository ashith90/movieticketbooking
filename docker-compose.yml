services:
  gateway:
    build: ./gateway
    ports:
      - "4000:4000"
    env_file:
      - ./gateway/.env.example
    depends_on:
      - user-service
      - booking-service
      - movie-service
      - payment-service
      - notification-service

  user-service:
    build: ./services/user-service
    ports:
      - "5001:5001"
    env_file:
      - ./services/user-service/.env.example
    depends_on:
      - mongo

  booking-service:
    build: ./services/booking-service
    ports:
      - "5003:5003"
    env_file:
      - ./services/booking-service/.env.example
    depends_on:
      - mongo
      - redis
      - kafka

  movie-service:
    build: ./services/movie-service
    ports:
      - "5002:5002"
    env_file:
      - ./services/movie-service/.env.example
    depends_on:
      - mongo

  payment-service:
    build: ./services/payment-service
    ports:
      - "5004:5004"
    env_file:
      - ./services/payment-service/.env.example
    depends_on:
      - mongo
      - booking-service
      - kafka

  notification-service:
    build: ./services/notification-service
    ports:
      - "5005:5005"
    env_file:
      - ./services/notification-service/.env.example
    depends_on:
      - mongo
      - kafka

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  mongo_data:
